<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analytical Engine State Visualizer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Analytical Engine</h1>
        <p>Card-by-card state difference visualizer</p>
      </div>
      <div class="run-status" id="run-status">Ready</div>
    </header>

    <main class="workspace">
      <section class="deck-pane" aria-label="Card deck">
        <div class="pane-head">
          <h2>Cards</h2>
          <div class="button-row">
            <button id="load-sum" type="button" title="Load summation deck">Sum</button>
            <button id="load-division" type="button" title="Load division deck">
              Divide
            </button>
          </div>
        </div>
        <textarea id="deck-input" spellcheck="false"></textarea>
      </section>

      <section class="control-pane" aria-label="Execution controls">
        <div class="controls">
          <button id="back" type="button" title="Go back one executed card (Left Arrow)">
            Back
          </button>
          <button id="reset" type="button" title="Reset state and rewind cards (R)">
            Reset
          </button>
          <button id="step" type="button" title="Execute the highlighted card (Right Arrow)">
            Step
          </button>
          <button id="run" type="button" title="Run until halt or deck end">
            Run
          </button>
        </div>
        <div class="metrics" id="metrics"></div>
        <div class="instruction" id="instruction"></div>
      </section>

      <section class="state-pane" aria-label="Machine state">
        <div class="pane-head">
          <h2>State Difference</h2>
          <div class="legend">
            <span class="dot changed"></span> changed
            <span class="dot live"></span> active
          </div>
        </div>
        <div class="state-store-layout">
          <div class="diff-grid" id="diff-grid"></div>
          <div class="store-pane" aria-label="Store columns">
            <div class="pane-head">
              <h2>Store</h2>
              <span id="store-count"></span>
            </div>
            <div class="store-grid" id="store-grid"></div>
          </div>
        </div>
      </section>

      <section class="mechanism-pane" aria-label="Mechanical trace">
        <div class="pane-head">
          <h2>Mechanism Trace</h2>
          <span id="mechanism-count"></span>
        </div>
        <div class="mechanism-summary" id="mechanism-summary"></div>
        <div class="machine-map" aria-hidden="true">
          <div class="machine-node" data-part="reader">
            <span class="machine-icon">▾</span>Reader
          </div>
          <div class="machine-link"></div>
          <div class="machine-node" data-part="barrel">
            <span class="machine-icon">▤</span>Barrels
          </div>
          <div class="machine-link"></div>
          <div class="machine-node" data-part="axis">
            <span class="machine-icon">⌘</span>Axes
          </div>
          <div class="machine-link"></div>
          <div class="machine-node" data-part="mill">
            <span class="machine-icon">⚙</span>Mill
          </div>
          <div class="machine-link"></div>
          <div class="machine-node" data-part="store">
            <span class="machine-icon">□</span>Store
          </div>
        </div>
        <ol class="mechanism-ticks" id="mechanism-ticks"></ol>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
